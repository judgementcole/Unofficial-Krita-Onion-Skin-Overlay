---
name: krita
grade: stable
adopt-info: krita
base: core24
confinement: strict
apps:
  krita:
    common-id: org.kde.krita
    desktop: usr/share/applications/org.kde.krita.desktop
    command: usr/bin/krita
    extensions:
      - kde-neon-6
    plugs:
      - home
      - removable-media
      - cups
    environment:
      LD_LIBRARY_PATH: $SNAP/ffmpeg-platform/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:${LD_LIBRARY_PATH}
      PATH: $SNAP/ffmpeg-platform/usr/bin:${PATH}
plugs:
  ffmpeg-2404:
    interface: content
    target: ffmpeg-platform # the folder where this content snap will be mounted
    default-provider: ffmpeg-2404
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.krita
    bus: session
parts:
  openjpeg:
    source: https://github.com/uclouvain/openjpeg.git
    source-tag: v2.5.4
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DBUILD_STATIC_LIBS=OFF
  xsimd:
    source: https://github.com/xtensor-stack/xsimd.git
    source-tag: 14.1.0
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
  kseexpr:
    source: https://invent.kde.org/graphics/kseexpr.git
    plugin: cmake
    build-packages:
      - bison
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
      - -DQUAZIP_QT_MAJOR_VERSION=6
  pyqt6:
    source: .
    plugin: python
    python-packages:
      - PyQt6==6.10.2
      - PyQt6-Qt6==6.10.2
      - PyQt6-sip
      - sip
  eigen:
    source: https://gitlab.com/libeigen/eigen.git
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
      - -DQUAZIP_QT_MAJOR_VERSION=6
  libgpgmepp-qt6:
    build-packages:
      - libassuan-dev
      - libgpg-error-dev
      - rsync
    stage-packages:
      - libassuan0
      - libgpg-error0
    source: https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-1.23.2.tar.bz2
    source-checksum: sha256/9499e8b1f33cccb6815527a1bc16049d35a6198a6c5fae0185f2bd561bce5224
    plugin: autotools
    autotools-configure-parameters:
      - --disable-gpgsm-test
      - --enable-languages=cpp,qt6
      - --prefix=/usr
      - --enable-fixed-path=/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR
    build-environment: &buildenvironment
      - LD_LIBRARY_PATH: $LD_LIBRARY_PATH:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy:/snap/kf6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/usr
      - PKG_CONFIG_PATH: /snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig
    override-build: |
      craftctl default
      rsync -a --ignore-existing $CRAFT_PART_INSTALL/ /
  poppler:
    after:
      - libgpgmepp-qt6
    plugin: cmake
    source: https://poppler.freedesktop.org/poppler-26.02.0.tar.xz
    build-packages:
      - cmake
      - libfreetype6-dev
      - libfontconfig1-dev
      - libjpeg-dev
      - zlib1g-dev
      - liblcms2-dev
      - libcurl4-gnutls-dev
      - libboost-dev
      - libgl1-mesa-dev
    stage-packages:
      - libasn1-8-heimdal
      - libbrotli1
      - libcurl4t64
      - libdouble-conversion3
      - libfontconfig1
      - libfreetype6
      - libgraphite2-3
      - libgssapi3-heimdal
      - libharfbuzz0b
      - libhcrypto5t64-heimdal
      - libheimbase1-heimdal
      - libheimntlm0-heimdal
      - libhx509-5-heimdal
      - libicu74
      - libjbig0
      - libjpeg-turbo8
      - libkrb5-26-heimdal
      - liblcms2-2
      - libldap2
      - libnghttp2-14
      - libpcre2-16-0
      - libpng16-16
      - libpsl5
      - libroken19-heimdal
      - librtmp1
      - libsasl2-2
      - libssh-4
      - libtiff6
      - libwebp7
      - libwind0-heimdal
      - libx11-6
      - libxau6
      - libxcb1
      - libxdmcp6
      - libmd4c0
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=ON
      - -DBUILD_TESTING=OFF
      - -DENABLE_NSS3=OFF
    override-build: |
      craftctl default
      rsync -a --ignore-existing $CRAFT_PART_INSTALL/ /
  quazip:
    source: https://github.com/stachenov/quazip.git
    source-tag: v1.5
    plugin: cmake
    build-packages:
      - zlib1g-dev
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
      - -DQUAZIP_QT_MAJOR_VERSION=6
  kdcraw:
    source: https://invent.kde.org/graphics/libkdcraw.git
    source-branch: release/26.04
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
    build-packages:
      - cmake
      - libraw-dev
      - libx11-dev
      - pkg-config
  krita:
    after:
      - kdcraw
      - quazip
      - poppler
      - eigen
      - pyqt6
      - kseexpr
      - xsimd
      - openjpeg
    source: .
    source-type: local
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
      - -DBUILD_KRITA_QT_DESIGNER_PLUGINS=OFF
      - -DBUILD_WITH_QT6=ON
      - -DALLOW_UNSTABLE=QT6
      - "-DCMAKE_FIND_ROOT_PATH=$CRAFT_STAGE\\;/snap/kde-qt6-core24-sdk/current\\;/snap/kf6-core24-sdk/current;/snap/kde-pyside6-core24-sdk/current\\;/usr"
      - "-DCMAKE_PREFIX_PATH=$CRAFT_STAGE/usr\\;/snap/kde-qt6-core24-sdk/current/usr\\;/snap/kf6-core24-sdk/current/usr\\;/snap/kde-pyside6-core24-sdk/current/usr\\;/usr"
    build-packages:
      - cmake
      - gettext
      - libboost-system-dev
      - libcurl4-gnutls-dev
      - libexiv2-dev
      - libfftw3-dev
      - libgif-dev
      - libgsl-dev
      - libheif-dev
      - libimmer-dev
      - libjpeg-dev
      - liblager-dev
      - liblcms2-dev
      - libmypaint-dev
      - libopencolorio-dev
      - libopenexr-dev
      - libpng-dev
      - libpostproc-dev
      - libquazip5-dev
      - libraw-dev
      - libraqm-dev
      - libtiff-dev
      - libturbojpeg0-dev
      - libunibreak-dev
      - libwebp-dev
      - libsharpyuv-dev
      - libsharpyuv0
      - libxcb-util0-dev
      - libxcb1-dev
      - libxi-dev
      - libzug-dev
      - pkg-config
      - python3-sip-dev
      - vc-dev
      - xtl-dev
      - zlib1g-dev
      - libmlt-dev
      - libmlt++-dev
      - libsdl2-dev
      - libfribidi-dev
      - libfreetype6-dev
      - libjxl-dev
      - python3-dev
      - sip-tools
      - python3-sipbuild
      - libxkbcommon-dev
      - libxkbcommon0
      - libsharpyuv-dev
    build-snaps:
      - ffmpeg-2404-sdk
      - kf6-core24-sdk/latest/beta
      - kde-qt6-core24-sdk/latest/stable
      - kde-pyside6-core24-sdk/latest/stable
    parse-info:
      - usr/share/metainfo/org.kde.krita.appdata.xml
    stage-packages:
      - libexiv2-27
      - libfftw3-double3
      - libfontconfig1
      - libfreetype6
      - libgcc-s1
      - libgif7
      - libgsl27
      - libheif1
      - libjpeg-turbo8
      - liblcms2-2
      - libmypaint-1.5-1
      - libopencolorio2.1t64
      - libopenexr-3-1-30
      - libpng16-16
      - libpython3.12
      - libtiff6
      - libturbojpeg
      - libunibreak5
      - libwebp7
      - libwebpdemux2
      - libwebpmux3
      - libx11-6
      - zlib1g
      - colord
      - colord-data
      - libmlt7
      - libsdl2-2.0-0
      - libmlt++7
      - libimath-3-1-29
      - libxkbcommon0
      - libsharpyuv0
    build-environment:
      - DICPATH: "$SNAP/usr/share/hunspell"
      - PYSIDE_DESIGNER_PLUGINS: /snap/kde-pyside6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qt6/plugins/designer
      - PYTHONPATH: $CRAFT_STAGE/usr/lib/python3.12:$CRAFT_STAGE/usr/lib/python3/dist-packages:/snap/kde-qt6-core24-sdk/current/usr/lib/python3.12:/snap/kde-qt6-core24-sdk/current/usr/lib/python3/dist-packages:/snap/kde-pyside6-core24-sdk/current/usr/lib/python3.12:/snap/kde-pyside6-core24-sdk/current/usr/lib/python3/dist-packages${PYTHONPATH:+:$PYTHONPATH}
      - LIBCLANG_LIBDIR: /snap/kde-qt6-core24-sdk/current/usr/lib/llvm-19/lib
      - LIBCLANG_PATH: /snap/kde-qt6-core24-sdk/current/usr/lib/llvm-19/bin
      - LLVM_INSTALL_DIR: /snap/kde-qt6-core24-sdk/current/usr/lib/llvm-19
      - PATH: /snap/kde-qt6-core24-sdk/current/usr/bin:/snap/kde-qt6-core24-sdk/current/usr/lib/llvm-19/bin:/snap/kde-pyside6-core24-sdk/current/usr/bin${PATH:+:$PATH}
      - QT_PLUGIN_PATH: "$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/plugins:/snap/kf6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/plugins:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/plugins"
      - QML_IMPORT_PATH: "$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qml:/snap/kf6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qml:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/qml"
      - QT_INSTALL_QML: $QML_IMPORT_PATH
      - LD_LIBRARY_PATH: "$CRAFT_STAGE/lib:$CRAFT_STAGE/usr/lib:$CRAFT_STAGE/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/snap/kde-qt6-core24-sdk/current/usr/lib:/snap/kde-qt6-core24-sdk/current/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}:/snap/kde-qt6-core24-sdk/current/usr/lib:/snap/kde-qt6-core24-sdk/current/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}:/snap/kde-pyside6-core24-sdk/current/usr/lib:/snap/kde-qt6-core24-sdk/current/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/libproxy:/snap/ffmpeg-2404-sdk/current/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/:${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/doc/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
  gpu-2404:
    after: [krita]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - krita
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
        cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done
